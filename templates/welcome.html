<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy League</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/welcome.css') }}">
</head>
<body class="welcome-page">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <header class="header">
        <div class="logo">
            <h1 class="logo-text">PyGuide</h1>
        </div>
        <nav class="nav">
            <a href="/">Home</a>
            <a href="/logout" class="logout-btn">Log Out</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2 class="hero-title">Welcome to PyGuide!</h2>
            <p class="hero-subtitle">Learn Python with ease</p>
        </div>
    </section>

    <section class="sign-in">
        <h3>Sign In</h3>
        <form class="login-form" method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
    </section>

    <section class="cta">
        <p>New to PyGuide?</p>
        <a href="/register" class="btn btn-secondary">Register Now</a>
    </section>
</body>
</html>
