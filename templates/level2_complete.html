<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 2 Complete</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/welcome.css') }}">

    <style>
        body {
            background: #f5f2ff;
            font-family: "Inter", sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .complete-card {
            width: 70%;
            margin: 150px auto 0 auto; 
            padding: 40px 45px;
            background: linear-gradient(135deg, #6a00ff, #b44dff);
            color: white;
            border-radius: 22px;
            box-shadow: 0 12px 36px rgba(120,0,255,0.35);
            animation: fadeIn 0.6s ease;
        }

        .complete-card h1 {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 18px;
        }

        .complete-card p {
            font-size: 22px;
            margin-bottom: 18px;
        }

        .link-btn {
            display: inline-block;
            margin: 15px 12px;
            padding: 14px 28px;
            background: white;
            color: #5c00c7;
            font-size: 20px;
            font-weight: 700;
            border-radius: 14px;
            text-decoration: none;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .link-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 26px rgba(0,0,0,0.25);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    {% include 'components/header.html' %}


<div class="complete-card">
    <h1>🎉 Congrats, you finished Level 2!</h1>

    <p>You unlocked Level 3 - your next lesson is:</p>
    <p><strong>Lesson 10: Files & Exceptions</strong></p>

    <a href="{{ url_for('lesson_detail', lesson_id=24) }}" class="link-btn">
        🚀 Start Lesson 10
    </a>

    <a href="{{ url_for('display_lessons') }}" class="link-btn">
        🔙 Back to Lessons
    </a>
</div>

</body>
</html>
